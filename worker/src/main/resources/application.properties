spring.application.name=eventmanagerworker

# =========== RabbitMQ Configuration ===========
spring.rabbitmq.host=${QUEUE_HOST:localhost}
spring.rabbitmq.port=${QUEUE_PORT:5672}
spring.rabbitmq.username=${QUEUE_USER:admin}
spring.rabbitmq.password=${QUEUE_PASSWORD:admin}

# ========== Hibernate Configuration ===========
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ========== PostgreSQL Configuration ==========
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:event_db}
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver
