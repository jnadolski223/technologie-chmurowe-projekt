spring.application.name=eventmanagerbackend

# ========== PostgreSQL Configuration ==========
# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:event}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# PostgreSQL JPA Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========== RabbitMQ Configuration ===========
spring.rabbitmq.host=${QUEUE_HOST:localhost}
spring.rabbitmq.port=${QUEUE_PORT:5672}
spring.rabbitmq.username=${QUEUE_USER:guest}
spring.rabbitmq.password=${QUEUE_PASSWORD:guest}
